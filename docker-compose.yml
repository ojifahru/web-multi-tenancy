name: ${COMPOSE_PROJECT_NAME:-multi-tenant}

services:
  multi-tenant_app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    volumes:
      - ./:/var/www/html
    networks:
      - shared_net
    extra_hosts:
      - "host.docker.internal:host-gateway"

  multi-tenant_queue:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    restart: unless-stopped
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=120
    volumes:
      - ./:/var/www/html
    networks:
      - shared_net
    depends_on:
      - multi-tenant_app

  multi-tenant_nginx:
    image: nginx:1.27-alpine
    depends_on:
      - multi-tenant_app
    restart: unless-stopped
    ports:
      - "${NGINX_BIND_IP:-127.0.0.1}:${NGINX_HTTP_PORT:-8002}:80"
    volumes:
      - ./public:/var/www/html/public:ro
      - ./storage:/var/www/html/storage:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - shared_net

networks:
  shared_net:
    external: true
    name: shared_net
